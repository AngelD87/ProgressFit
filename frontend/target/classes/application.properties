# Nombre de la app
spring.application.name=ProgressFit

# Base de datos
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/progressfit?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=admin

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Puerto del servidor
server.port=8080

# JWT
jwt.secret=progressfit2024claveSecretaSuperSeguraParaJWT
jwt.expiration=86400000

# Desactivar open-in-view
spring.jpa.open-in-view=false

# Spring Security
spring.security.user.name=admin
spring.security.user.password=admin