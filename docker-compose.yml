services:

  mysql:
    image: mysql:8.0
    container_name: progressfit-mysql
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: progressfit
    ports:
      - "3307:3306"
    volumes:
      - datos-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-padmin"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: progressfit-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/progressfit?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: progressfit-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  datos-mysql: